<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Plantillas</title>

  <!-- OBLIGATORIO: Office.js desde el CDN oficial -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 15px; }
    h1 { color: #004a99; font-size: 20px; }
    p { font-size: 14px; color: #333; }
    a { color: #0078d4; text-decoration: none; font-weight: bold; }
    .btn { display: inline-block; margin-top: 10px; padding: 8px 12px; background: #004a99; color: white; border-radius: 4px; }
    .ok { margin-top: 12px; padding: 8px; background: #e6ffed; border: 1px solid #2ea043; border-radius: 4px; }
    .err { margin-top: 12px; padding: 8px; background: #ffebe9; border: 1px solid #cf222e; border-radius: 4px; }
  </style>
</head>

<body>
  <h1>Plantillas</h1>
  <p>Aquí se muestran las plantillas de Ascendum.</p>
  <a href="https://ascendumgroup.com/" target="_blank" class="btn">Ir a Ascendum</a>

  <div id="status"></div>

  <script>
    // Inicialización recomendada: usar Office.onReady con callback
    Office.onReady(function(info) {
      document.getElementById("status").innerHTML =
        '<div class="ok">✅ Office.js listo. Host: <b>' + info.host + '</b> | Plataforma: <b>' + info.platform + '</b></div>';
      console.log("Office.js listo", info);
    }).catch(function(e) {
      document.getElementById("status").innerHTML =
        '<div class="err">❌ Error inicializando Office.js: ' + (e && e.message ? e.message : e) + '</div>';
      console.error("Error Office.onReady", e);
    });
  </script>
</body>
</html>
